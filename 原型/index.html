<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ApplePie — 原型预览</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --apple-green:#7CB342;--apple-red:#E57373;--apple-blue:#64B5F6;
  --apple-orange:#FFB74D;--apple-purple:#BA68C8;
  --bg:#FFFAF5;--card:#FFFFFF;--text:#3E2723;--text2:#8D6E63;
  --border:#E8D5C8;--radius:18px;--radius-sm:12px;
  --learn:#64B5F6;--rest:#81C784;--sport:#FFB74D;--social:#BA68C8;--explore:#4FC3F7;
  --shadow:0 2px 16px rgba(62,39,35,0.06);
}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#EDE7E0;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
/* ===== Phone Frame ===== */
.phone{width:390px;height:844px;background:var(--bg);border-radius:40px;overflow:hidden;position:relative;box-shadow:0 20px 60px rgba(0,0,0,.18),0 0 0 2px #222;display:flex;flex-direction:column}
.phone-header{height:54px;background:#1a1a1a;display:flex;align-items:flex-end;justify-content:center;padding-bottom:8px;flex-shrink:0}
.phone-notch{width:120px;height:28px;background:#111;border-radius:0 0 20px 20px;position:relative}
.phone-notch::after{content:'';position:absolute;top:6px;right:14px;width:8px;height:8px;border-radius:50%;background:#1a3a4a}
.screen{flex:1;overflow-y:auto;scroll-behavior:smooth;position:relative}
.screen-inner{padding:20px 20px 30px;min-height:100%}
/* ===== Typography ===== */
.h1{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-0.3px}
.h2{font-size:20px;font-weight:700;color:var(--text)}
.h3{font-size:16px;font-weight:600;color:var(--text)}
.p{font-size:14px;color:var(--text2);line-height:1.6}
.caption{font-size:12px;color:var(--text2)}
.badge{font-size:11px;font-weight:600;padding:2px 10px;border-radius:20px;display:inline-block}
/* ===== Nav ===== */
.nav-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px}
.nav-back{width:36px;height:36px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;cursor:pointer;border:1px solid var(--border);font-size:14px}
.nav-step{font-size:12px;color:var(--text2);font-weight:500}
/* ===== Cards ===== */
.card{background:var(--card);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);margin-bottom:16px}
.card-sm{background:var(--card);border-radius:var(--radius-sm);padding:14px 16px;box-shadow:var(--shadow);margin-bottom:10px}
/* ===== Buttons ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 28px;border-radius:30px;font-size:15px;font-weight:600;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--apple-green);color:#fff;width:100%}
.btn-primary:hover{background:#689F38}
.btn-outline{background:var(--card);border:2px solid var(--apple-green);color:var(--apple-green)}
.btn-ghost{background:transparent;color:var(--text2)}
/* ===== Step Indicator ===== */
.steps{display:flex;gap:6px;margin-bottom:24px}
.step-dot{flex:1;height:4px;border-radius:2px;background:var(--border)}
.step-dot.on{background:var(--apple-green)}
/* ===== Grade Grid ===== */
.grade-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.grade-item{padding:16px 12px;background:var(--card);border:2px solid var(--border);border-radius:var(--radius-sm);text-align:center;cursor:pointer;transition:all .2s;font-size:14px;font-weight:500;color:var(--text)}
.grade-item.sel{border-color:var(--apple-green);background:#F1F8E9;color:var(--apple-green);font-weight:700}
/* ===== Subject Tags ===== */
.tag-wrap{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:500;cursor:pointer;border:1.5px solid var(--border);background:var(--card);color:var(--text2);transition:all .2s}
.tag.sel{border-color:var(--apple-green);background:#F1F8E9;color:var(--apple-green);font-weight:600}
/* ===== Theme Cards ===== */
.theme-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.theme-card{padding:24px 16px;background:var(--card);border:2px solid var(--border);border-radius:var(--radius);text-align:center;cursor:pointer;transition:all .2s}
.theme-card.sel{border-color:var(--apple-green);box-shadow:0 0 0 3px rgba(124,179,66,0.15)}
.theme-emoji{font-size:40px;margin-bottom:8px}
.theme-name{font-size:14px;font-weight:600;color:var(--text)}
.theme-desc{font-size:11px;color:var(--text2);margin-top:4px}
/* ===== Time Dimension Colors ===== */
.dim-learn{background:var(--learn)}.dim-rest{background:var(--rest)}.dim-sport{background:var(--sport)}.dim-social{background:var(--social)}.dim-explore{background:var(--explore)}
.dim-dot{width:10px;height:10px;border-radius:50%;display:inline-block;margin-right:6px;flex-shrink:0}
/* ===== Progress Bars ===== */
.bar-wrap{height:10px;border-radius:5px;background:#F0E8E0;overflow:hidden;flex:1}
.bar-fill{height:100%;border-radius:5px;transition:width .6s}
/* ===== Game Screen ===== */
.game-bg{position:absolute;inset:0;background:linear-gradient(180deg,#1a1a3e 0%,#2d1b69 30%,#4a2c8a 60%,#1a1a2e 100%)}
.game-content{position:relative;z-index:1;display:flex;flex-direction:column;justify-content:flex-end;min-height:100%;padding:20px}
.game-scene-img{width:100%;height:280px;border-radius:var(--radius);background:linear-gradient(135deg,#1a237e 0%,#311b92 40%,#4a148c 70%,#1b5e20 100%);position:relative;overflow:hidden;margin-bottom:16px}
.game-scene-img::after{content:'🌌';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:60px;opacity:.6}
.game-text-area{background:rgba(0,0,0,.75);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:var(--radius);padding:20px;margin-bottom:12px}
.game-narration{font-size:14px;color:rgba(255,255,255,.8);line-height:1.7;margin-bottom:12px}
.game-dialogue{display:flex;gap:10px;align-items:flex-start}
.game-avatar{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,#FFB74D,#FF8A65);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:18px}
.game-line{flex:1}
.game-speaker{font-size:12px;color:rgba(255,255,255,.5);margin-bottom:4px}
.game-speech{font-size:15px;color:#fff;line-height:1.6}
.game-choices{margin-top:8px;display:flex;flex-direction:column;gap:8px}
.game-choice{width:100%;padding:14px 18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:30px;color:#fff;font-size:14px;cursor:pointer;text-align:left;transition:all .2s}
.game-choice:hover{background:rgba(255,255,255,.2)}
/* ===== Home Dashboard ===== */
.greeting{margin-bottom:6px}
.slogan{font-size:13px;color:var(--apple-green);font-weight:600;margin-bottom:20px}
.today-card{background:linear-gradient(135deg,#558B2F,#7CB342);border-radius:var(--radius);padding:20px;color:#fff;margin-bottom:16px}
.today-card .h2{color:#fff;margin-bottom:4px}
.today-card .p{color:rgba(255,255,255,.85)}
.today-progress{display:flex;gap:20px;margin-top:14px}
.today-stat{text-align:center}
.today-num{font-size:28px;font-weight:700}
.today-label{font-size:11px;opacity:.8;margin-top:2px}
.dim-bar{margin-top:14px}
.dim-row{display:flex;align-items:center;gap:8px;margin-bottom:6px;font-size:12px;color:rgba(255,255,255,.9)}
.game-entry{background:var(--card);border-radius:var(--radius);padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;box-shadow:var(--shadow);margin-bottom:16px}
.game-entry-emoji{font-size:36px}
.game-entry-title{font-size:15px;font-weight:700;color:var(--text)}
.game-entry-sub{font-size:12px;color:var(--text2);margin-top:2px}
/* ===== AI Import ===== */
.upload-zone{border:2px dashed var(--border);border-radius:var(--radius);padding:30px 20px;text-align:center;cursor:pointer;margin-bottom:16px;transition:all .2s;background:var(--card)}
.upload-zone:hover{border-color:var(--apple-green)}
.upload-icon{font-size:40px;margin-bottom:8px}
.voice-bar{background:var(--card);border-radius:30px;padding:14px 20px;display:flex;align-items:center;gap:12px;margin-bottom:16px;box-shadow:var(--shadow)}
.voice-dot{width:12px;height:12px;border-radius:50%;background:var(--apple-red);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.voice-text{font-size:14px;color:var(--text2);flex:1}
/* ===== Five Dim Analysis ===== */
.radar-preview{width:200px;height:200px;margin:0 auto 20px;position:relative}
.radar-preview svg{width:100%;height:100%}
.analysis-alert{padding:12px 16px;border-radius:var(--radius-sm);margin-bottom:10px;font-size:13px;display:flex;align-items:center;gap:8px}
.alert-warn{background:#FFF3E0;color:#E65100}
.alert-good{background:#E8F5E9;color:#2E7D32}
.alert-bad{background:#FFEBEE;color:#C62828}
/* ===== Parent View ===== */
.report-header{text-align:center;padding:10px 0 20px}
.report-week{font-size:13px;color:var(--text2)}
.highlight-card{background:linear-gradient(135deg,#FFF8E1,#FFF3E0);border-radius:var(--radius);padding:20px;margin-bottom:14px;text-align:center}
.highlight-emoji{font-size:36px;margin-bottom:6px}
.highlight-text{font-size:14px;color:#5D4037;line-height:1.6;font-weight:500}
/* ===== Bottom Tabs ===== */
.tabs{display:flex;border-top:1px solid var(--border);padding:8px 16px 20px;justify-content:space-between;position:sticky;bottom:0;background:var(--bg)}
.tab{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--text2);cursor:pointer}
.tab.on{color:var(--apple-green)}
.tab-icon{font-size:20px}
/* ===== Transitions ===== */
.screen-page{display:none}
.screen-page.active{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.progress-steps{display:flex;align-items:center;justify-content:center;gap:0;margin:14px 0 20px}
.progress-dot-wrap{display:flex;align-items:center}
.progress-dot-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;background:var(--border);color:#fff}
.progress-dot-num.done{background:var(--apple-green)}
.progress-dot-num.curr{background:var(--apple-green);box-shadow:0 0 0 4px rgba(124,179,66,0.2)}
.progress-line{width:40px;height:2px;background:var(--border);margin:0 6px}
.progress-line.done{background:var(--apple-green)}
/* ===== Chapter input ===== */
.chapter-input{width:100%;padding:12px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-size:14px;background:var(--card);color:var(--text);margin-top:6px}
.chapter-input:focus{outline:none;border-color:var(--apple-green)}
/* ===== Schedule preview ===== */
.schedule-preview{background:var(--card);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
.schedule-day{padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:600;color:var(--text)}
.schedule-day:last-child{border-bottom:none}
.schedule-item{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--text2);padding:4px 0}
.schedule-time{font-weight:600;color:var(--text);min-width:74px;font-size:12px}
/* ===== Notification ===== */
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 24px;border-radius:24px;font-size:13px;z-index:999;animation:toastIn .3s,toastOut .3s 2s forwards}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
@keyframes toastOut{from{opacity:1}to{opacity:0}}
</style>
</head>
<body>

<div class="phone" id="app">
  <div class="phone-header"><div class="phone-notch"></div></div>
  <div class="screen" id="screen"></div>
</div>

<script>
// ===== Navigation =====
const pages = {};
let currentPage = '';

function render(pageId) {
  currentPage = pageId;
  document.getElementById('screen').innerHTML = pages[pageId] || '';
  // Re-bind events for the new page
  const fn = window['bind_' + pageId.replace(/-/g,'_')];
  if (fn) fn();
}

// ===== Toast =====
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2300);
}

// ===== Data Store =====
const store = {
  grade: '', textbook: '', nickname: '',
  subjects: [],
  chapters: {}, // { '数学': '第十四章 一次函数' }
  theme: '',
};

// ══════════════════════════════════════════════════
//  PAGE 0: Onboarding Step 1 — 年级 + 教材 + 昵称
// ══════════════════════════════════════════════════
pages['onboard-1'] = `
<div class="screen-inner">
  <div class="nav-bar">
    <div class="nav-back" onclick="render('onboard-1')">←</div>
    <div class="nav-step">1/3</div>
  </div>
  <div class="steps">
    <div class="step-dot on"></div>
    <div class="step-dot"></div>
    <div class="step-dot"></div>
  </div>
  <h1 class="h1" style="margin-bottom:6px">你好 👋</h1>
  <p class="p" style="margin-bottom:24px">先来认识一下你，我们会帮你更好地规划学习和生活。</p>

  <div class="h3" style="margin-bottom:12px">我在读</div>
  <div class="grade-grid" id="gradeGrid">
    ${['初一','初二','初三','高一','高二','高三'].map(g =>
      `<div class="grade-item" data-grade="${g}" onclick="selGrade(this,'${g}')">${g}</div>`
    ).join('')}
  </div>

  <div class="h3" style="margin-top:20px;margin-bottom:12px">教材版本</div>
  <div class="tag-wrap" id="txtGrid">
    ${['人教版','北师大版','苏教版','沪教版','浙教版','其他'].map(t =>
      `<span class="tag" data-txt="${t}" onclick="selTextbook(this,'${t}')">${t}</span>`
    ).join('')}
  </div>

  <div class="h3" style="margin-top:20px;margin-bottom:12px">大家怎么叫你</div>
  <input class="chapter-input" id="nickInput" placeholder="输入你的昵称" oninput="store.nickname=this.value" value="${store.nickname}">

  <div style="margin-top:30px">
    <button class="btn btn-primary" onclick="goOnboard2()">下一步 →</button>
  </div>
</div>`;

function selGrade(el, g) {
  document.querySelectorAll('#gradeGrid .grade-item').forEach(i=>i.classList.remove('sel'));
  el.classList.add('sel');
  store.grade = g;
}
function selTextbook(el, t) {
  document.querySelectorAll('#txtGrid .tag').forEach(i=>i.classList.remove('sel'));
  el.classList.add('sel');
  store.textbook = t;
}
function goOnboard2() {
  if (!store.grade) return toast('请选择年级');
  if (!store.textbook) return toast('请选择教材版本');
  if (!store.nickname.trim()) return toast('请输入昵称');
  store.nickname = document.getElementById('nickInput')?.value || store.nickname;
  render('onboard-2');
}
window['bind_onboard-1'] = function() {
  // restore selection
  if (store.grade) {
    const gi = document.querySelector(`[data-grade="${store.grade}"]`);
    if (gi) gi.classList.add('sel');
  }
  if (store.textbook) {
    const ti = document.querySelector(`[data-txt="${store.textbook}"]`);
    if (ti) ti.classList.add('sel');
  }
};

// ══════════════════════════════════════════════════
//  PAGE 1: Onboarding Step 2 — 学科 + 章节
// ══════════════════════════════════════════════════
pages['onboard-2'] = `
<div class="screen-inner">
  <div class="nav-bar">
    <div class="nav-back" onclick="render('onboard-1')">←</div>
    <div class="nav-step">2/3</div>
  </div>
  <div class="steps">
    <div class="step-dot on"></div>
    <div class="step-dot on"></div>
    <div class="step-dot"></div>
  </div>
  <h1 class="h1" style="margin-bottom:6px">你在学什么</h1>
  <p class="p" style="margin-bottom:24px">选择你的学科和当前章节，AI 游戏会围绕这些内容展开。</p>

  <div class="h3" style="margin-bottom:12px">学科</div>
  <div class="tag-wrap" id="subjGrid">
    ${['语文','数学','英语','物理','化学','生物','历史','地理'].map(s =>
      `<span class="tag" data-subj="${s}" onclick="selSubject(this,'${s}')">${s}</span>`
    ).join('')}
  </div>

  <div id="chapterArea" style="margin-top:16px"></div>

  <div style="margin-top:30px">
    <button class="btn btn-primary" onclick="goOnboard3()">下一步 →</button>
  </div>
</div>`;

let selSubjs = new Set(store.subjects);
function selSubject(el, s) {
  if (selSubjs.has(s)) { selSubjs.delete(s); el.classList.remove('sel'); }
  else { selSubjs.add(s); el.classList.add('sel'); }
  store.subjects = [...selSubjs];
  renderChapterInputs();
}
function renderChapterInputs() {
  const area = document.getElementById('chapterArea');
  if (!area) return;
  area.innerHTML = [...selSubjs].map(s => `
    <div style="margin-bottom:12px">
      <label class="caption" style="font-weight:600">📖 ${s} — 当前章节</label>
      <input class="chapter-input" data-subj="${s}" placeholder="如：第十四章 一次函数"
        value="${store.chapters[s]||''}" oninput="store.chapters['${s}']=this.value">
    </div>
  `).join('');
}
function goOnboard3() {
  if (selSubjs.size === 0) return toast('请至少选择一个学科');
  // collect chapters
  document.querySelectorAll('#chapterArea input').forEach(inp => {
    store.chapters[inp.dataset.subj] = inp.value;
  });
  render('onboard-3');
}
window['bind_onboard-2'] = function() {
  selSubjs = new Set(store.subjects);
  document.querySelectorAll('#subjGrid .tag').forEach(el => {
    if (selSubjs.has(el.dataset.subj)) el.classList.add('sel');
  });
  renderChapterInputs();
};

// ══════════════════════════════════════════════════
//  PAGE 2: Onboarding Step 3 — 故事主题
// ══════════════════════════════════════════════════
pages['onboard-3'] = `
<div class="screen-inner">
  <div class="nav-bar">
    <div class="nav-back" onclick="render('onboard-2')">←</div>
    <div class="nav-step">3/3</div>
  </div>
  <div class="steps">
    <div class="step-dot on"></div>
    <div class="step-dot on"></div>
    <div class="step-dot on"></div>
  </div>
  <h1 class="h1" style="margin-bottom:6px">选一个主题故事</h1>
  <p class="p" style="margin-bottom:24px">选一个你感兴趣的故事背景，知识点会藏在冒险里。</p>

  <div class="theme-grid" id="themeGrid">
    ${[
      {emoji:'🌌',name:'星际探险',desc:'穿越星系，用数学和物理破解宇宙谜题',tag:'数理向'},
      {emoji:'🏛️',name:'古文明解密',desc:'在遗迹中解读古文、推演历史真相',tag:'文史向'},
      {emoji:'🌿',name:'生态守护',desc:'守护濒危物种，探索生命科学的奥秘',tag:'生物/地理向'},
      {emoji:'🎲',name:'随机惊喜',desc:'交给 AI 决定，每次都是新体验',tag:'综合向'},
    ].map(t => `
      <div class="theme-card" data-theme="${t.name}" onclick="selTheme(this,'${t.name}')">
        <div class="theme-emoji">${t.emoji}</div>
        <div class="theme-name">${t.name}</div>
        <div class="theme-desc">${t.desc}</div>
      </div>
    `).join('')}
  </div>

  <div style="margin-top:30px">
    <button class="btn btn-primary" onclick="goHome()">🎮 开始 ApplePie</button>
  </div>
</div>`;

function selTheme(el, t) {
  document.querySelectorAll('#themeGrid .theme-card').forEach(i=>i.classList.remove('sel'));
  el.classList.add('sel');
  store.theme = t;
}
function goHome() {
  if (!store.theme) return toast('请选择一个主题故事');
  toast('🎉 配置完成！欢迎来到 ApplePie');
  setTimeout(() => render('home'), 800);
}
window['bind_onboard-3'] = function() {
  if (store.theme) {
    const ti = document.querySelector(`[data-theme="${store.theme}"]`);
    if (ti) ti.classList.add('sel');
  }
};

// ══════════════════════════════════════════════════
//  PAGE 3: Home Dashboard
// ══════════════════════════════════════════════════
pages['home'] = `
<div class="screen-inner">
  <div class="nav-bar">
    <div class="h2">🍎 ApplePie</div>
    <div class="badge" style="background:#F1F8E9;color:#558B2F">${store.grade} · ${store.nickname}</div>
  </div>

  <p class="slogan">AppleU，成长可以快乐，把童年还给孩子。</p>

  <!-- Today Card -->
  <div class="today-card">
    <div style="display:flex;justify-content:space-between;align-items:center">
      <div>
        <div class="h2">📅 6月29日 周日</div>
        <div class="p">今天还有 3 项待完成</div>
      </div>
