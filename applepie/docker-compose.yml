# ============================================================
# ApplePie — Docker Compose (2 containers: app + postgres)
#
# 使用方法:
#   1. 配置 .env 文件（参考 .env.docker.example）
#   2. docker compose up -d
#   3. 访问 http://localhost:3000
#
# 离线分发:
#   开发机: docker save -o applepie-images.tar applepie-app postgres:16-alpine
#   目标机: docker load -i applepie-images.tar && docker compose up -d
# ============================================================

services:
  # ---- PostgreSQL Database ----
  postgres:
    image: postgres:16-alpine
    container_name: applepie-db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-applepie}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-applepie}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - applepie-network

  # ---- Next.js Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: applepie-app:latest
    container_name: applepie-app
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      # Database
      DATABASE_URL: "postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/${DB_NAME:-applepie}"
      # Auth
      AUTH_SECRET: ${AUTH_SECRET}
      # AI: Text (DeepSeek)
      TEXT_BASE_URL: ${TEXT_BASE_URL}
      TEXT_API_KEY: ${TEXT_API_KEY}
      TEXT_MODEL: ${TEXT_MODEL}
      # AI: Vision (Doubao)
      VISION_BASE_URL: ${VISION_BASE_URL}
      VISION_API_KEY: ${VISION_API_KEY}
      VISION_MODEL: ${VISION_MODEL}
      # AI: Image (Doubao Seedream)
      IMAGE_BASE_URL: ${IMAGE_BASE_URL}
      IMAGE_API_KEY: ${IMAGE_API_KEY}
      IMAGE_MODEL: ${IMAGE_MODEL}
      # TTS (optional)
      TTS_BASE_URL: ${TTS_BASE_URL:-}
      TTS_API_KEY: ${TTS_API_KEY:-}
      TTS_SPEECH_MODEL: ${TTS_SPEECH_MODEL:-}
      # Dev
      MOCK_IMAGE: ${MOCK_IMAGE:-false}
      IMAGE_TIMEOUT_MS: ${IMAGE_TIMEOUT_MS:-}
      IMAGE_HEDGE_MS: ${IMAGE_HEDGE_MS:-}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - applepie-network

volumes:
  postgres_data:
    name: applepie-postgres-data

networks:
  applepie-network:
    name: applepie-network
